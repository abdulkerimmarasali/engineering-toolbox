name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5

      - name: Build (onedir)
        run: pyinstaller --noconfirm --clean --windowed --name EngineeringToolbox --paths src --collect-submodules modules --add-data "data\sstm_veritabani.db;data" src\main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EngineeringToolbox-windows
          path: dist/EngineeringToolbox/**
